name: Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          version=$(jq -r .version custom_components/upgrade_advisor/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.current.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        if: steps.check.outputs.exists == 'true'
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Determine release version
        id: version
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.current.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            custom_components/upgrade_advisor/manifest.json > tmp.json
          mv tmp.json custom_components/upgrade_advisor/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/upgrade_advisor/manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create release zip
        run: |
          cd custom_components/upgrade_advisor
          zip -r ../../upgrade-advisor.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          files: upgrade-advisor.zip
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
